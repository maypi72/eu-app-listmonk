name: Build and Push Listmonk

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: [self-hosted, Linux]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      #may need to install docker if not already available on the self-hosted runner 
      #remember to add the self-hosted runner to the docker group to avoid needing sudo for docker commands
      - name: Ensure Docker is installed
        shell: bash
        run: |
          if command -v docker >/dev/null 2>&1; then
            echo "Docker is already installed."
            docker --version
            exit 0
          fi

          echo "Docker is not installed. Installing..."

          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y docker.io
          elif command -v dnf >/dev/null 2>&1; then
            sudo dnf install -y docker
          elif command -v yum >/dev/null 2>&1; then
            sudo yum install -y docker
          else
            echo "No supported package manager found (apt-get, dnf, yum)."
            exit 1
          fi

          sudo systemctl enable --now docker || true
          docker --version

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/listmonk:${{ github.sha }} .

      - name: Push image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/listmonk:${{ github.sha }}
